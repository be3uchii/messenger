<title>Physics World — Online</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;height:100%;width:100%;background:#87ceeb;}
body{touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;width:100%;height:100%;}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;width:24px;height:24px;}
#crosshair svg{width:100%;height:100%;filter:drop-shadow(0 0 3px rgba(0,0,0,0.6));}
#crosshair svg line{stroke:rgba(255,255,255,0.92);stroke-width:2;stroke-linecap:round;}

#item-label{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-shadow:0 2px 8px rgba(0,0,0,0.8);pointer-events:none;z-index:10;opacity:0;transition:opacity 0.25s;background:rgba(0,0,0,0.3);padding:4px 12px;border-radius:16px;backdrop-filter:blur(4px);}

#joystick-zone{position:fixed;left:0;bottom:0;width:150px;height:150px;z-index:20;pointer-events:auto;}
#joystick-base{position:absolute;bottom:18px;left:18px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.18);box-shadow:0 4px 24px rgba(0,0,0,0.25);}
#joystick-knob{position:absolute;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.55),rgba(255,255,255,0.18));border:2px solid rgba(255,255,255,0.55);box-shadow:0 4px 14px rgba(0,0,0,0.45);top:50%;left:50%;transform:translate(-50%,-50%);}

#right-buttons{position:fixed;right:12px;bottom:18px;z-index:20;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:auto;}
.action-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:rgba(15,15,25,0.65);color:#fff;font-size:9px;font-family:'Segoe UI',system-ui,sans-serif;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;backdrop-filter:blur(10px);box-shadow:0 4px 20px rgba(0,0,0,0.6);transition:background 0.1s,transform 0.08s;-webkit-tap-highlight-color:transparent;text-transform:uppercase;}
.action-btn:active{transform:scale(0.88);background:rgba(60,80,160,0.8);}
.action-btn svg{width:22px;height:22px;fill:white;stroke:white;stroke-width:1.5;}
.action-btn.held{background:rgba(40,100,220,0.75);border-color:rgba(100,160,255,0.75);}

#btn-fullscreen{width:38px;height:38px;border-radius:8px;position:fixed;top:10px;right:10px;z-index:30;border:1.5px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.35);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,0.4);}
#btn-fullscreen svg{width:20px;height:20px;fill:white;stroke:white;stroke-width:1.5;}
#btn-fullscreen:active{background:rgba(50,50,100,0.8);}

#hint{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.8);font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;pointer-events:none;z-index:10;display:none;background:rgba(0,0,0,0.35);padding:4px 12px;border-radius:16px;backdrop-filter:blur(6px);}

#stats{position:fixed;top:10px;left:10px;color:rgba(255,255,255,0.85);font-family:'Segoe UI',system-ui,monospace;font-size:10px;pointer-events:none;z-index:10;line-height:1.6;background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:8px;backdrop-filter:blur(6px);}

#online-panel{position:fixed;top:10px;right:54px;z-index:30;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,0.4);border:1.5px solid rgba(255,255,255,0.18);border-radius:16px;padding:4px 10px;backdrop-filter:blur(8px);}
#online-dot{width:8px;height:8px;border-radius:50%;background:#888;transition:background 0.4s;box-shadow:0 0 6px currentColor;}
#online-dot.connected{background:#44ff88;box-shadow:0 0 8px #44ff88;}
#online-dot.error{background:#ff4444;box-shadow:0 0 8px #ff4444;}
#online-count{color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:700;}

#nickname-overlay{position:fixed;inset:0;background:rgba(0,0,20,0.82);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:14px;backdrop-filter:blur(8px);}
#nickname-overlay h2{color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-size:26px;font-weight:900;letter-spacing:2px;text-shadow:0 2px 20px rgba(80,160,255,0.7);margin:0;}
#nickname-overlay p{color:rgba(255,255,255,0.6);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;margin:0;}
#nickname-input{padding:10px 18px;border-radius:12px;border:2px solid rgba(100,180,255,0.5);background:rgba(255,255,255,0.08);color:#fff;font-size:16px;font-family:'Segoe UI',system-ui,sans-serif;font-weight:700;outline:none;text-align:center;width:240px;max-width:90vw;backdrop-filter:blur(4px);}
#nickname-input::placeholder{color:rgba(255,255,255,0.35);}
#nickname-btn{padding:10px 34px;border-radius:12px;border:none;background:linear-gradient(135deg,#3388ff,#7744ff);color:#fff;font-size:15px;font-family:'Segoe UI',system-ui,sans-serif;font-weight:800;cursor:pointer;letter-spacing:1px;transition:opacity 0.15s,transform 0.1s;box-shadow:0 4px 20px rgba(80,100,255,0.5);}
#nickname-btn:active{opacity:0.8;transform:scale(0.96);}

.player-label{position:fixed;pointer-events:none;z-index:15;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,0.9);background:rgba(0,0,0,0.45);padding:2px 7px;border-radius:8px;transform:translate(-50%,-100%);white-space:nowrap;display:none;border:1px solid rgba(255,255,255,0.2);}
</style>
</head>

</div>
<button id="btn-fullscreen">
  <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m14-5h3a2 2 0 012 2v3M8 21H5a2 2 0 01-2-2v-3m14 5h3a2 2 0 002-2v-3"/></svg>
</button>
<div id="hint">Клик — управление | WASD | E взять | Q бросить</div>
<div id="stats">0 FPS</div>

<div id="online-panel">

  <span id="online-count">0 онлайн</span>
</div>

  { name:'Стекло', color:0xAADDFF, mass:3.0, roughness:0.04, metalness:0.08, restitution:0.22, friction:0.15, linDamp:0.08, angDamp:0.12, transparent:true, opacity:0.45, emissive:0x003355, emissiveIntensity:0.08, makeTexture: makeGlassTexture },
  { name:'Слизь', color:0x33DD55, mass:1.8, roughness:0.95, metalness:0.0, restitution:0.88, friction:0.98, linDamp:0.22, angDamp:0.3, emissive:0x004400, emissiveIntensity:0.12, makeTexture: makeSlimeTexture },
  { name:'Камень', color:0x7A7870, mass:18, roughness:0.98, metalness:0.0, restitution:0.02, friction:0.88, linDamp:0.08, angDamp:0.15, emissive:0x000000, emissiveIntensity:0, makeTexture: makeStoneTexture },
  { name:'Резина', color:0x1A1A1A, mass:3.2, roughness:0.99, metalness:0.0, restitution:0.94, friction:1.1, linDamp:0.18, angDamp:0.25, emissive:0x000000, emissiveIntensity:0, makeTexture: makeRubberTexture },
  { name:'Лёд', color:0xDDEEFF, mass:2.2, roughness:0.01, metalness:0.04, restitution:0.32, friction:0.02, linDamp:0.03, angDamp:0.05, transparent:true, opacity:0.78, emissive:0x002244, emissiveIntensity:0.1, makeTexture: makeIceTexture },
  { name:'Золото', color:0xFFCC11, mass:40, roughness:0.15, metalness:1.0, restitution:0.06, friction:0.35, linDamp:0.05, angDamp:0.08, emissive:0x221100, emissiveIntensity:0.05, makeTexture: makeGoldTexture },
  { name:'Дерево', color:0xB87040, mass:4.5, roughness:0.85, metalness:0.0, restitution:0.12, friction:0.75, linDamp:0.12, angDamp:0.18, emissive:0x000000, emissiveIntensity:0, makeTexture: makeWoodTexture },
  { name:'Камень', color:0x888078, mass:18, roughness:0.98, metalness:0.0, restitution:0.02, friction:0.88, linDamp:0.08, angDamp:0.15, emissive:0x000000, emissiveIntensity:0, makeTexture: makeStoneTexture },
];

function px(size) { const c = document.createElement('canvas'); c.width=size; c.height=size; return c; }
function tex(c) { const t = new THREE.CanvasTexture(c); t.anisotropy=renderer.capabilities.getMaxAnisotropy(); t.generateMipmaps=true; return t; }

function makeWoodTexture() {
  const c=px(512); const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#a0612a'); g.addColorStop(0.3,'#c8843a'); g.addColorStop(0.7,'#b07030'); g.addColorStop(1,'#8a4e1e');
  x.fillStyle=g; x.fillRect(0,0,512,512);
  for(let i=0;i<18;i++){
    const y0=i*28+Math.random()*6;
    x.strokeStyle=`rgba(${60+Math.random()*20},${25+Math.random()*10},${5+Math.random()*5},${0.15+Math.random()*0.15})`;
    x.lineWidth=0.8+Math.random()*1.5; x.beginPath(); x.moveTo(0,y0);
    for(let p=0;p<=512;p+=12) x.lineTo(p,y0+Math.sin(p*0.035+i*0.7)*4+Math.random()*2-1);
    x.stroke();
  }
  return tex(c);
}
function makeMetalTexture() {
  const c=px(512); const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,512,512);
  g.addColorStop(0,'#7a8a9a'); g.addColorStop(0.5,'#e0eaf4'); g.addColorStop(1,'#6a7a8a');
  x.fillStyle=g; x.fillRect(0,0,512,512);
  for(let i=0;i<30;i++){
    x.strokeStyle=`rgba(200,220,240,${0.08+Math.random()*0.12})`;
    x.lineWidth=0.5+Math.random(); x.beginPath(); x.moveTo(0,i*17); x.lineTo(512,i*17+Math.random()*6-3); x.stroke();
  }
  return tex(c);
}
function makeGlassTexture() {
  const c=px(256); const x=c.getContext('2d');
  x.fillStyle='rgba(200,230,255,0.15)'; x.fillRect(0,0,256,256);
  const g=x.createRadialGradient(80,80,5,128,128,160);
  g.addColorStop(0,'rgba(255,255,255,0.35)'); g.addColorStop(1,'rgba(100,160,220,0.05)');
  x.fillStyle=g; x.fillRect(0,0,256,256);
  return tex(c);
}
function makeSlimeTexture() {
  const c=px(512); const x=c.getContext('2d');
  const g=x.createRadialGradient(256,256,10,256,256,256);
  g.addColorStop(0,'#44ee66'); g.addColorStop(0.5,'#22cc44'); g.addColorStop(1,'#119933');
  x.fillStyle=g; x.fillRect(0,0,512,512);
  for(let i=0;i<25;i++){
    const bx=Math.random()*512,by=Math.random()*512,br=Math.random()*35+8;
    const bg=x.createRadialGradient(bx,by,0,bx,by,br);
    bg.addColorStop(0,'rgba(100,255,120,0.3)'); bg.addColorStop(1,'rgba(0,180,40,0)');
    x.fillStyle=bg; x.beginPath(); x.arc(bx,by,br,0,Math.PI*2); x.fill();
  }
  return tex(c);
}
function makeStoneTexture() {
  const c=px(512); const x=c.getContext('2d');
  x.fillStyle='#7a7870'; x.fillRect(0,0,512,512);
  for(let i=0;i<200;i++){
    const sx=Math.random()*512,sy=Math.random()*512,sr=Math.random()*18+2;
    const lum=Math.floor(80+Math.random()*70);
    x.fillStyle=`rgb(${lum+4},${lum},${lum-4})`; x.beginPath(); x.arc(sx,sy,sr,0,Math.PI*2); x.fill();
  }
  return tex(c);
}
function makeRubberTexture() {
  const c=px(512); const x=c.getContext('2d');
  x.fillStyle='#141414'; x.fillRect(0,0,512,512);
  for(let i=0;i<15;i++){
    x.strokeStyle=`rgba(55,55,55,${0.3+Math.random()*0.25})`; x.lineWidth=1.5+Math.random();
    x.beginPath();
    for(let p=0;p<=512;p+=10) x.lineTo(p,i*34+Math.sin(p*0.06)*4);
    x.stroke();
  }
  return tex(c);
}
function makeIceTexture() {
  const c=px(512); const x=c.getContext('2d');
  const g=x.createRadialGradient(200,180,10,256,256,280);
  g.addColorStop(0,'#eaf8ff'); g.addColorStop(0.4,'#bde8ff'); g.addColorStop(1,'#8ac8ee');
  x.fillStyle=g; x.fillRect(0,0,512,512);
  for(let i=0;i<18;i++){
    const sx=Math.random()*512,sy=Math.random()*512;
    x.strokeStyle=`rgba(180,225,255,${0.3+Math.random()*0.3})`; x.lineWidth=0.5+Math.random()*0.8;
    x.beginPath(); x.moveTo(sx,sy);
    for(let j=0;j<5;j++) x.lineTo(sx+Math.random()*80-40,sy+Math.random()*80-40);
    x.stroke();
  }
  return tex(c);
}
function makeGoldTexture() {
  const c=px(512); const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,512,512);
  g.addColorStop(0,'#ffd700'); g.addColorStop(0.25,'#ffe87c'); g.addColorStop(0.5,'#ffd700'); g.addColorStop(0.75,'#c8960c'); g.addColorStop(1,'#ffd700');
  x.fillStyle=g; x.fillRect(0,0,512,512);
  return tex(c);
}
function makeGroundTexture() {
  const c=px(1024); const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,1024);
  g.addColorStop(0,'#5a7a3a'); g.addColorStop(0.4,'#4e6e30'); g.addColorStop(1,'#3d5a24');
  x.fillStyle=g; x.fillRect(0,0,1024,1024);
  for(let i=0;i<500;i++){
    const bx=Math.random()*1024,by=Math.random()*1024;
    const lum=40+Math.random()*30;
    x.fillStyle=`rgba(${lum+20},${lum+30},${lum},${0.4+Math.random()*0.3})`;
    x.beginPath(); x.arc(bx,by,Math.random()*6+1,0,Math.PI*2); x.fill();
  }
  return tex(c);
}

function makeSkyGradient() {
  const geo=new THREE.SphereGeometry(280,32,16);
  const c=document.createElement('canvas'); c.width=4; c.height=512;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,512);
  g.addColorStop(0,'#1a6ab5'); g.addColorStop(0.35,'#4a9fd4'); g.addColorStop(0.65,'#82c4e8'); g.addColorStop(0.85,'#c8e8f8'); g.addColorStop(1,'#f4c060');
  ctx.fillStyle=g; ctx.fillRect(0,0,4,512);
  const t=new THREE.CanvasTexture(c);
  const mat=new THREE.MeshBasicMaterial({ map:t, side:THREE.BackSide, depthWrite:false });
  scene.add(new THREE.Mesh(geo, mat));
}

function init() {
  scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0xc8e8f8,70,220);
  renderer=new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.25;
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  camera=new THREE.PerspectiveCamera(72,window.innerWidth/window.innerHeight,0.05,400);
  camera.position.set(0,1.75,0);

  makeSkyGradient();

  scene.add(new THREE.HemisphereLight(0x88c8f0,0x446633,0.9));
  scene.add(new THREE.AmbientLight(0xfff4e0,0.55));

  sunLight=new THREE.DirectionalLight(0xfff8e8,3.8);
  sunLight.position.set(30,60,20);
  sunLight.castShadow=true;
  sunLight.shadow.mapSize.width=2048;
  sunLight.shadow.mapSize.height=2048;
  sunLight.shadow.camera.near=1; sunLight.shadow.camera.far=200;
  const sd=30;
  sunLight.shadow.camera.left=-sd; sunLight.shadow.camera.right=sd;
  sunLight.shadow.camera.top=sd; sunLight.shadow.camera.bottom=-sd;
  sunLight.shadow.bias=-0.0005; sunLight.shadow.normalBias=0.02;
  scene.add(sunLight);
  scene.add(new THREE.DirectionalLight(0x88aaff,0.6));

  sunMesh=new THREE.Mesh(new THREE.SphereGeometry(4,16,16),new THREE.MeshBasicMaterial({color:0xfff4b0}));
  sunMesh.position.set(80,160,50);
  scene.add(sunMesh);

  window.addEventListener('resize',onResize);
}

function initPhysics() {
  world=new CANNON.World();
  world.gravity.set(0,-18,0);
  world.broadphase=new CANNON.SAPBroadphase(world);
  world.solver.iterations=25;
  world.solver.tolerance=0.0005;
  world.allowSleep=true;
}

function createGround() {
  const hs=PLATFORM_SIZE*0.5;
  const thickness=0.6;
  const gMat=new CANNON.Material('ground');
  gMat.friction=0.75; gMat.restitution=0.05;
  const gb=new CANNON.Body({ mass:0, shape:new CANNON.Box(new CANNON.Vec3(hs,thickness*0.5,hs)), material:gMat });
  gb.position.set(0,-thickness*0.5,0);
  world.addBody(gb);

  const gt=makeGroundTexture();
  gt.wrapS=gt.wrapT=THREE.RepeatWrapping; gt.repeat.set(PLATFORM_SIZE/3,PLATFORM_SIZE/3);
  const mat=new THREE.MeshStandardMaterial({ map:gt, roughness:0.95, metalness:0.02 });
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(PLATFORM_SIZE,thickness,PLATFORM_SIZE),mat);
  mesh.position.set(0,-thickness*0.5,0); mesh.receiveShadow=true;
  scene.add(mesh);

  const edgeMat=new THREE.MeshStandardMaterial({color:0x8899aa,roughness:0.5,metalness:0.35});
  [
    {s:[PLATFORM_SIZE+0.3,0.25,0.25],p:[0,0.12,hs+0.12]},
    {s:[PLATFORM_SIZE+0.3,0.25,0.25],p:[0,0.12,-hs-0.12]},
    {s:[0.25,0.25,PLATFORM_SIZE+0.3],p:[hs+0.12,0.12,0]},
    {s:[0.25,0.25,PLATFORM_SIZE+0.3],p:[-hs-0.12,0.12,0]},
  ].forEach(e => {
    const em=new THREE.Mesh(new THREE.BoxGeometry(...e.s),edgeMat);
    em.position.set(...e.p); em.receiveShadow=true; scene.add(em);
  });

  const wallT=0.2, wallH=0.5, wallPhysMat=new CANNON.Material('wall');
  [
    {pos:[0,wallH*0.5,hs+wallT*0.5],s:[PLATFORM_SIZE,wallH,wallT]},
    {pos:[0,wallH*0.5,-(hs+wallT*0.5)],s:[PLATFORM_SIZE,wallH,wallT]},
    {pos:[hs+wallT*0.5,wallH*0.5,0],s:[wallT,wallH,PLATFORM_SIZE]},
    {pos:[-(hs+wallT*0.5),wallH*0.5,0],s:[wallT,wallH,PLATFORM_SIZE]},
  ].forEach(w => {
    const wb=new CANNON.Body({mass:0,material:wallPhysMat});
    wb.addShape(new CANNON.Box(new CANNON.Vec3(w.s[0]*0.5,w.s[1]*0.5,w.s[2]*0.5)));
    wb.position.set(...w.pos); world.addBody(wb);
  });
}

function createPlayer() {
  const mat=new CANNON.Material('player');
  mat.friction=0.01; mat.restitution=0.0;
  playerBody=new CANNON.Body({mass:70,material:mat});
  playerBody.addShape(new CANNON.Sphere(0.42));
  playerBody.position.set((Math.random()-0.5)*8,1.5,(Math.random()-0.5)*8+8);
  playerBody.linearDamping=0.92; playerBody.angularDamping=1.0;
  playerBody.fixedRotation=true; playerBody.allowSleep=false;
  playerBody.updateMassProperties();
  world.addBody(playerBody);
  playerBody.addEventListener('collide', e => { if(e.contact.ni.y>0.45) onGround=true; });
}

const BLOCK_POSITIONS = [
  [0,1.2,0],[-2.5,1.2,-1],[2.2,1.2,-1.5],[-1.2,1.2,2.2],
  [3.2,1.2,1],[-3.2,1.2,2.5],[1.8,1.2,-3.2],[-2.2,2.5,-2.8],
  [0.5,2.5,-2.2],[2.8,1.2,2.8],
];

async function initBlocks() {
  const { data, error } = await sb.from('game_objects').select('*').order('object_key');

  if (!error && data && data.length >= BLOCK_COUNT) {
    data.forEach(row => {
      const idx = parseInt(row.object_key.replace('block_',''));
      if (idx >= 0 && idx < BLOCK_COUNT) {
        const type = BLOCK_TYPES[row.type_index % BLOCK_TYPES.length];
        const pos = new THREE.Vector3(row.pos_x, row.pos_y, row.pos_z);
        const quat = new CANNON.Quaternion(row.quat_x, row.quat_y, row.quat_z, row.quat_w);
        createBlockWithKey('block_'+idx, row.type_index, type, pos, quat);
      }
    });
  } else {
    const inserts = [];
    BLOCK_POSITIONS.forEach((pos, i) => {
      const typeIdx = i % BLOCK_TYPES.length;
      const type = BLOCK_TYPES[typeIdx];
      createBlockWithKey('block_'+i, typeIdx, type, new THREE.Vector3(...pos), null);
      inserts.push({
        object_key: 'block_'+i,
        type_index: typeIdx,
        pos_x: pos[0], pos_y: pos[1], pos_z: pos[2],
        quat_x:0, quat_y:0, quat_z:0, quat_w:1,
        vel_x:0, vel_y:0, vel_z:0,
      });
    });
    if (inserts.length > 0) {
      await sb.from('game_objects').upsert(inserts, { onConflict:'object_key' });
    }
  }
}

function createBlockWithKey(key, typeIdx, type, position, quatOverride) {
  const size = 0.78;
  const hs = size * 0.5;
  const cannonMat = new CANNON.Material(type.name);
  cannonMat.friction = type.friction; cannonMat.restitution = type.restitution;
  const body = new CANNON.Body({
    mass: type.mass, shape: new CANNON.Box(new CANNON.Vec3(hs,hs,hs)),
    material: cannonMat, sleepSpeedLimit: 0.06, sleepTimeLimit: 0.3,
  });
  body.position.set(position.x, position.y + hs, position.z);
  if (quatOverride) body.quaternion.copy(quatOverride);
  body.linearDamping = type.linDamp; body.angularDamping = type.angDamp;
  body.allowSleep = true;
  world.addBody(body);
  physicsBodies.push(body);

  const opts = {
    color: type.color, roughness: type.roughness, metalness: type.metalness,
    emissive: new THREE.Color(type.emissive), emissiveIntensity: type.emissiveIntensity || 0,
  };
  if (type.transparent) { opts.transparent=true; opts.opacity=type.opacity; opts.depthWrite=false; }
  if (type.makeTexture) opts.map = type.makeTexture();
  const mat = new THREE.MeshStandardMaterial(opts);
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(size,size,size), mat);
  mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.userData.body = body;
  mesh.userData.typeName = type.name;
  mesh.userData.typeMass = type.mass;
  mesh.userData.isBlock = true;
  mesh.userData.objectKey = key;
  scene.add(mesh);
  physicsToMesh.set(body, mesh);
  objectKeyToBody.set(key, body);
  objectKeyToIndex.set(key, typeIdx);

  const cm = new CANNON.ContactMaterial(
    cannonMat, new CANNON.Material('ground'),
    { friction: type.friction*0.9, restitution: type.restitution*0.9 }
  );
  world.addContactMaterial(cm);
  return { body, mesh };
}

function getOrCreateOtherPlayer(sessionId, color, nickname) {
  if (otherPlayers.has(sessionId)) return otherPlayers.get(sessionId);

  const group = new THREE.Group();

  const bodyGeo = new THREE.CylinderGeometry(0.34, 0.34, 1.2, 10);
  const bodyMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness:0.6 });
  const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
  bodyMesh.position.y = 0.6; bodyMesh.castShadow = true;
  group.add(bodyMesh);

  const headGeo = new THREE.SphereGeometry(0.34, 10, 8);
  const headMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color), roughness:0.5 });
  const headMesh = new THREE.Mesh(headGeo, headMat);
  headMesh.position.y = 1.45; headMesh.castShadow = true;
  group.add(headMesh);

  const eyeGeo = new THREE.SphereGeometry(0.07, 6, 4);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const pupilGeo = new THREE.SphereGeometry(0.04, 4, 4);
  const pupilMat = new THREE.MeshBasicMaterial({color:0x000000});

  const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.14, 1.48, 0.3); group.add(eyeL);
  const pupilL = new THREE.Mesh(pupilGeo, pupilMat); pupilL.position.set(-0.14, 1.48, 0.34); group.add(pupilL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.14, 1.48, 0.3); group.add(eyeR);
  const pupilR = new THREE.Mesh(pupilGeo, pupilMat); pupilR.position.set(0.14, 1.48, 0.34); group.add(pupilR);

  scene.add(group);

  const label = document.createElement('div');
  label.className = 'player-label';
  label.textContent = nickname || 'Player';
  label.style.borderColor = color;
  document.body.appendChild(label);

  const data = {
    group, label,
    pos: new THREE.Vector3(),
    targetPos: new THREE.Vector3(),
    yaw: 0, targetYaw: 0,
    lastUpdate: Date.now(),
    color, nickname
  };
  otherPlayers.set(sessionId, data);
  return data;
}

function removeOtherPlayer(sessionId) {
  const p = otherPlayers.get(sessionId);
  if (!p) return;
  scene.remove(p.group);
  p.label.remove();
  otherPlayers.delete(sessionId);
}

function updateOtherPlayerLabels() {
  otherPlayers.forEach((p) => {
    const pos3d = p.group.position.clone();
    pos3d.y += 2.2;
    const projected = pos3d.clone().project(camera);
    if (projected.z > 1) { p.label.style.display='none'; return; }
    const sx = (projected.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-projected.y * 0.5 + 0.5) * window.innerHeight;
    p.label.style.display = 'block';
    p.label.style.left = sx + 'px';
    p.label.style.top = sy + 'px';
  });
}

let realtimeChannel = null;
let heartbeatInterval = null;

async function startMultiplayer() {
  await registerPlayer();

  realtimeChannel = sb.channel('physics_world', {
    config: { broadcast: { self: false }, presence: { key: SESSION_ID } }
  });

  realtimeChannel.on('broadcast', { event: 'player_move' }, ({ payload }) => {
    if (payload.id === SESSION_ID) return;
    const p = getOrCreateOtherPlayer(payload.id, payload.color, payload.nickname);
    p.targetPos.set(payload.x, payload.y, payload.z);
    p.targetYaw = payload.yaw;
    p.lastUpdate = Date.now();
  });

  realtimeChannel.on('broadcast', { event: 'object_grab' }, ({ payload }) => {
    if (payload.sender === SESSION_ID) return;
    const body = objectKeyToBody.get(payload.key);
    if (body) {
      remoteHeldObjects.set(payload.key, payload.sender);
      body.type = CANNON.Body.KINEMATIC;
      body.position.set(payload.px, payload.py, payload.pz);
      body.velocity.set(0,0,0);
      body.angularVelocity.set(0,0,0);
      const mesh = physicsToMesh.get(body);
      if (mesh) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }
    }
  });

  realtimeChannel.on('broadcast', { event: 'object_throw' }, ({ payload }) => {
    if (payload.sender === SESSION_ID) return;
    const body = objectKeyToBody.get(payload.key);
    if (body) {
      remoteHeldObjects.delete(payload.key);
      body.type = CANNON.Body.DYNAMIC;
      body.position.set(payload.px, payload.py, payload.pz);
      body.velocity.set(payload.vx, payload.vy, payload.vz);
      body.angularVelocity.set(payload.avx, payload.avy, payload.avz);
      body.wakeUp();
      const mesh = physicsToMesh.get(body);
      if (mesh) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }
    }
  });

  realtimeChannel.on('broadcast', { event: 'object_move' }, ({ payload }) => {
    if (payload.sender === SESSION_ID) return;
    if (remoteHeldObjects.get(payload.key) !== payload.sender) return;
    const body = objectKeyToBody.get(payload.key);
    if (body && body.type === CANNON.Body.KINEMATIC) {
      body.position.set(payload.px, payload.py, payload.pz);
      const mesh = physicsToMesh.get(body);
      if (mesh) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }
    }
  });

  realtimeChannel.on('broadcast', { event: 'object_release' }, ({ payload }) => {
    if (payload.sender === SESSION_ID) return;
    const body = objectKeyToBody.get(payload.key);
    if (body) {
      remoteHeldObjects.delete(payload.key);
      body.type = CANNON.Body.DYNAMIC;
      body.position.set(payload.px, payload.py, payload.pz);
      body.velocity.set(0,0,0);
      body.angularVelocity.set(0,0,0);
      body.wakeUp();
      const mesh = physicsToMesh.get(body);
      if (mesh) {
        mesh.position.copy(body.position);
        mesh.quaternion.copy(body.quaternion);
      }
    }
  });

  realtimeChannel.on('broadcast', { event: 'player_leave' }, ({ payload }) => {
    remoteHeldObjects.forEach((owner, key) => {
      if (owner === payload.id) {
        const body = objectKeyToBody.get(key);
        if (body) {
          body.type = CANNON.Body.DYNAMIC;
          body.wakeUp();
        }
        remoteHeldObjects.delete(key);
      }
    });
    removeOtherPlayer(payload.id);
    updateOnlineCount();
  });

  realtimeChannel.on('presence', { event: 'sync' }, () => updateOnlineCount());
  realtimeChannel.on('presence', { event: 'join' }, () => updateOnlineCount());
  realtimeChannel.on('presence', { event: 'leave' }, ({ leftPresences }) => {
    leftPresences.forEach(p => {
      if (p.session_id) {
        remoteHeldObjects.forEach((owner, key) => {
          if (owner === p.session_id) {
            const body = objectKeyToBody.get(key);
            if (body) {
              body.type = CANNON.Body.DYNAMIC;
              body.wakeUp();
            }
            remoteHeldObjects.delete(key);
          }
        });
        removeOtherPlayer(p.session_id);
      }
    });
    updateOnlineCount();
  });

  realtimeChannel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      setOnlineStatus(true);
      await realtimeChannel.track({
        session_id: SESSION_ID,
        nickname: MY_NICKNAME,
        color: MY_COLOR,
      });
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
      setOnlineStatus(false);
    }
  });

  setInterval(cleanupStaleOtherPlayers, 5000);
  heartbeatInterval = setInterval(async () => {
    await sb.from('players').update({ last_seen: new Date().toISOString() }).eq('session_id', SESSION_ID);
  }, 3000);

  window.addEventListener('beforeunload', async () => {
    if (realtimeChannel) {
      realtimeChannel.send({ type:'broadcast', event:'player_leave', payload:{ id: SESSION_ID } });
    }
    await sb.from('players').delete().eq('session_id', SESSION_ID);
  });
}

async function registerPlayer() {
  await sb.from('players').upsert({
    session_id: SESSION_ID,
    nickname: MY_NICKNAME,
    color: MY_COLOR,
    pos_x: 0, pos_y: 1.5, pos_z: 8,

}

function setOnlineStatus(ok) {
  const dot = document.getElementById('online-dot');
  dot.className = 'connected' + (ok ? '' : ' error');
}

function updateOnlineCount() {
  if (!realtimeChannel) return;
  const state = realtimeChannel.presenceState();
  const count = Object.keys(state).length;
  document.getElementById('online-count').textContent = count + ' онлайн';
}

function cleanupStaleOtherPlayers() {
  const now = Date.now();
  otherPlayers.forEach((p, id) => {
    if (now - p.lastUpdate > 6000) {
      remoteHeldObjects.forEach((owner, key) => {
        if (owner === id) {
          const body = objectKeyToBody.get(key);
          if (body) {
            body.type = CANNON.Body.DYNAMIC;
            body.wakeUp();
          }
          remoteHeldObjects.delete(key);
        }
      });
      removeOtherPlayer(id);
    }
  });
}

function setupControls() {
  document.addEventListener('keydown', e => {
    if(e.code==='KeyW') keys.w=true;
    if(e.code==='KeyA') keys.a=true;
    if(e.code==='KeyS') keys.s=true;
    if(e.code==='KeyD') keys.d=true;
    if(e.code==='Space'){ e.preventDefault(); tryJump(); }
    if(e.code==='KeyE') toggleGrab();
    if(e.code==='KeyQ') throwHeld();
    if(e.code==='KeyF') document.documentElement.requestFullscreen?.();
  });
  document.addEventListener('keyup', e => {
    if(e.code==='KeyW') keys.w=false;
    if(e.code==='KeyA') keys.a=false;
    if(e.code==='KeyS') keys.s=false;
    if(e.code==='KeyD') keys.d=false;
    if(e.code==='Space') keys.space=false;
  });

  renderer.domElement.addEventListener('click', () => { renderer.domElement.requestPointerLock?.(); });
  document.addEventListener('pointerlockchange', () => {
    document.getElementById('hint').style.display = document.pointerLockElement===renderer.domElement ? 'none' : 'block';
  });
  document.addEventListener('mousemove', e => {
    if(document.pointerLockElement===renderer.domElement) {
      yaw -= e.movementX*0.0015;
      pitch -= e.movementY*0.0015;
      pitch = Math.max(-Math.PI*0.48, Math.min(Math.PI*0.48, pitch));
    }
  });

  setupJoystick();
  setupLookZone();
  setupActionButtons();
  document.getElementById('btn-fullscreen').addEventListener('click', () => document.documentElement.requestFullscreen?.());
}

function setupJoystick() {
  const zone=document.getElementById('joystick-zone');
  const base=document.getElementById('joystick-base');
  const knob=document.getElementById('joystick-knob');
  const R=42;
  zone.addEventListener('touchstart', e => {
    e.preventDefault();
    for(const t of e.changedTouches) {
      if(joyState.active) continue;
      const r=base.getBoundingClientRect();
      const bx=r.left+r.width*0.5, by=r.top+r.height*0.5;
      if(t.clientX<150 && t.clientY>window.innerHeight-150) {
        joyState.active=true; joyState.id=t.identifier;
        joyState.baseX=bx; joyState.baseY=by;
      }
    }
  }, { passive:false });
  window.addEventListener('touchmove', e => {
    e.preventDefault();
    for(const t of e.changedTouches) {
      if(joyState.active && t.identifier===joyState.id) {
        const dx=t.clientX-joyState.baseX, dy=t.clientY-joyState.baseY;
        const len=Math.hypot(dx,dy), cl=Math.min(len,R);
        const nx=len>0?dx/len:0, ny=len>0?dy/len:0;
        joyState.dx=nx*(cl/R); joyState.dy=ny*(cl/R);
        knob.style.transform=`translate(calc(-50% + ${nx*cl}px),calc(-50% + ${ny*cl}px))`;
      }
    }
  }, { passive:false });
  const endJoy = e => {
    for(const t of e.changedTouches) {
      if(joyState.active && t.identifier===joyState.id) {
        joyState.active=false; joyState.id=-1; joyState.dx=0; joyState.dy=0;
        knob.style.transform='translate(-50%,-50%)';
      }
    }
  };
  window.addEventListener('touchend', endJoy);
  window.addEventListener('touchcancel', endJoy);
}

function setupLookZone() {
  window.addEventListener('touchstart', e => {
    for(const t of e.changedTouches) {
      if(lookState.active) continue;
      if(t.clientX<150 && t.clientY>window.innerHeight-150) continue;
      if(t.clientX>window.innerWidth-80 && t.clientY>window.innerHeight-200) continue;
      const el=document.elementFromPoint(t.clientX,t.clientY);
      if(el && (el.classList.contains('action-btn')||el.closest('.action-btn')||el.id==='btn-fullscreen')) continue;
      lookState.active=true; lookState.id=t.identifier;
      lookState.lastX=t.clientX; lookState.lastY=t.clientY;
    }
  }, { passive:true });
  window.addEventListener('touchmove', e => {
    for(const t of e.changedTouches) {
      if(lookState.active && t.identifier===lookState.id) {
        yaw -= (t.clientX-lookState.lastX)*0.0026;
        pitch -= (t.clientY-lookState.lastY)*0.0026;
        pitch=Math.max(-Math.PI*0.48,Math.min(Math.PI*0.48,pitch));
        lookState.lastX=t.clientX; lookState.lastY=t.clientY;
      }
    }
  }, { passive:true });
  const endLook = e => {
    for(const t of e.changedTouches) {
      if(lookState.active && t.identifier===lookState.id) { lookState.active=false; lookState.id=-1; }
    }
  };
  window.addEventListener('touchend', endLook);
  window.addEventListener('touchcancel', endLook);
}

function setupActionButtons() {
  document.getElementById('btn-jump').addEventListener('touchstart', e => { e.preventDefault(); tryJump(); }, { passive:false });
  document.getElementById('btn-jump').addEventListener('mousedown', tryJump);
  document.getElementById('btn-grab').addEventListener('touchstart', e => { e.preventDefault(); toggleGrab(); }, { passive:false });
  document.getElementById('btn-grab').addEventListener('mousedown', toggleGrab);
  document.getElementById('btn-throw').addEventListener('touchstart', e => { e.preventDefault(); throwHeld(); }, { passive:false });
  document.getElementById('btn-throw').addEventListener('mousedown', throwHeld);
}

function tryJump() {
  if(onGround && jumpCooldown<=0) { playerBody.velocity.y=7.5; onGround=false; jumpCooldown=0.4; }
}

function toggleGrab() { if(heldBody) releaseHeld(); else tryGrab(); }

function tryGrab() {
  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  raycaster.set(camera.position, dir);
  const objs=[]; physicsToMesh.forEach(m=>objs.push(m));
  const hits=raycaster.intersectObjects(objs);
  if(hits.length>0) {
    const h=hits[0];
    if(h.object.userData.isBlock && h.distance<5.0 && !remoteHeldObjects.has(h.object.userData.objectKey)) {
      heldMesh=h.object; heldBody=heldMesh.userData.body;
      heldObjectKey=heldMesh.userData.objectKey;
      heldBody.type=CANNON.Body.KINEMATIC; heldBody.wakeUp();
      heldBody.velocity.set(0,0,0); heldBody.angularVelocity.set(0,0,0);
      heldDistance=Math.max(1.8,Math.min(h.distance,3.2));
      const btn=document.getElementById('btn-grab');
      btn.classList.add('held'); btn.querySelector('span:last-child').textContent='ОТПУСТИТЬ';
      showLabel(heldMesh.userData.typeName + ' · ' + heldMesh.userData.typeMass + 'кг');
      broadcastObjectGrab(heldBody, heldObjectKey);
    }
  }
}

function releaseHeld() {
  if(!heldBody) return;
  heldBody.type=CANNON.Body.DYNAMIC; heldBody.wakeUp();
  broadcastObjectRelease(heldBody, heldObjectKey);
  heldBody=null; heldMesh=null; heldObjectKey=null;
  const btn=document.getElementById('btn-grab');
  btn.classList.remove('held'); btn.querySelector('span:last-child').textContent='ВЗЯТЬ';
  hideLabel();
}

function throwHeld() {
  if(!heldBody){ tryGrab(); if(!heldBody) return; }
  heldBody.type=CANNON.Body.DYNAMIC;
  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  const mass=heldBody.mass;
  const speed=24*Math.pow(1/Math.max(mass,1),0.16);
  heldBody.velocity.set(dir.x*speed,dir.y*speed+1.2,dir.z*speed);
  heldBody.angularVelocity.set((Math.random()-0.5)*6,(Math.random()-0.5)*6,(Math.random()-0.5)*6);
  heldBody.wakeUp();
  broadcastObjectThrow(heldBody, heldObjectKey);
  heldBody=null; heldMesh=null; heldObjectKey=null;
  const btn=document.getElementById('btn-grab');
  btn.classList.remove('held'); btn.querySelector('span:last-child').textContent='ВЗЯТЬ';
  hideLabel();
}

function showLabel(text) { const el=document.getElementById('item-label'); el.textContent=text; el.style.opacity='1'; }
function hideLabel() { document.getElementById('item-label').style.opacity='0'; }

let heldMoveCounter = 0;
function updatePlayer(dt) {
  onGround=false;
  const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
  const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  let mx=0, mz=0;
  if(keys.w){mx+=fwd.x;mz+=fwd.z;}
  if(keys.s){mx-=fwd.x;mz-=fwd.z;}
  if(keys.a){mx-=right.x;mz-=right.z;}
  if(keys.d){mx+=right.x;mz+=right.z;}
  if(joyState.active){mx+=fwd.x*(-joyState.dy)+right.x*joyState.dx;mz+=fwd.z*(-joyState.dy)+right.z*joyState.dx;}
  const len=Math.hypot(mx,mz);
  if(len>1){mx/=len;mz/=len;}
  playerBody.velocity.x=mx*6.2;
  playerBody.velocity.z=mz*6.2;
  if(playerBody.position.y<=0.42){playerBody.position.y=0.42;onGround=true;if(playerBody.velocity.y<0)playerBody.velocity.y=0;}
  if(jumpCooldown>0) jumpCooldown-=dt;
  const hs=PLATFORM_SIZE*0.5-0.6, p=playerBody.position;
  if(p.x>hs){p.x=hs;playerBody.velocity.x=0;} if(p.x<-hs){p.x=-hs;playerBody.velocity.x=0;}
  if(p.z>hs){p.z=hs;playerBody.velocity.z=0;} if(p.z<-hs){p.z=-hs;playerBody.velocity.z=0;}
  if(p.y<-5){p.y=1.5;playerBody.velocity.set(0,0,0);}
  camera.position.set(p.x,p.y+1.4,p.z);
  const qY=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),yaw);
  const qP=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),pitch);
  camera.quaternion.copy(qY).multiply(qP);
  sunLight.position.set(p.x+30,60,p.z+20);
  sunLight.target.position.set(p.x,0,p.z);
  sunLight.target.updateMatrixWorld();
}

function updateHeld() {
  if(!heldBody||!heldMesh) return;
  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  const target=camera.position.clone().add(dir.multiplyScalar(heldDistance));
  target.y=Math.max(target.y,0.5);
  heldBody.position.set(target.x,target.y,target.z);
  heldBody.velocity.set(0,0,0); heldBody.angularVelocity.set(0,0,0);
  heldMesh.position.copy(heldBody.position);
  heldMesh.quaternion.copy(heldBody.quaternion);
  
  heldMoveCounter++;
  if(heldMoveCounter % 3 === 0) {
    broadcastObjectMove(heldBody, heldObjectKey);
  }
}

function updateCrosshairLabel() {
  if(heldBody) return;
  const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
  raycaster.set(camera.position,dir);
  const objs=[]; physicsToMesh.forEach(m=>objs.push(m));
  const hits=raycaster.intersectObjects(objs);
  if(hits.length>0 && hits[0].distance<5.0 && hits[0].object.userData.isBlock) {
    const d=hits[0].object.userData;
    if(remoteHeldObjects.has(d.objectKey)) {
      showLabel(d.typeName + ' · ЗАНЯТО');
    } else {
      showLabel(d.typeName + ' · ' + d.typeMass + 'кг');
    }
  } else hideLabel();
}

function interpolateOtherPlayers(dt) {
  otherPlayers.forEach(p => {
    p.pos.lerp(p.targetPos, Math.min(1, dt * 18));
    p.yaw = p.yaw + (p.targetYaw - p.yaw) * Math.min(1, dt * 18);
    p.group.position.copy(p.pos);
    p.group.rotation.y = p.yaw + Math.PI;
  });
}

function onResize() {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
}

let lastFpsTime=0, fps=0, fpsCount=0;

function animate() {
  requestAnimationFrame(animate);
  if(!gameStarted) return;
  const dt=Math.min(clock.getDelta(),0.04);

  for(let i=0;i<3;i++) world.step(1/180,dt/3,2);

  updatePlayer(dt);
  updateHeld();
  interpolateOtherPlayers(dt);

  physicsToMesh.forEach((mesh,body) => {
    if (body !== heldBody && !remoteHeldObjects.has(mesh.userData.objectKey)) {
      mesh.position.copy(body.position);
      mesh.quaternion.copy(body.quaternion);
    }
  });

  frameCount++;
  if(frameCount%6===0) updateCrosshairLabel();
  if(frameCount%5===0) updateOtherPlayerLabels();

  const now = performance.now();
  if(now - lastPlayerSync > PLAYER_SYNC_INTERVAL) {
    broadcastPlayerMove();
    lastPlayerSync = now;
  }

  fpsCount++;
  if(now-lastFpsTime>1000) {
    fps=fpsCount; fpsCount=0; lastFpsTime=now;
    document.getElementById('stats').textContent=fps+' FPS';
  }

  renderer.render(scene,camera);
}

document.getElementById('nickname-btn').addEventListener('click', startGame);
document.getElementById('nickname-input').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });

async function startGame() {
  const input = document.getElementById('nickname-input').value.trim();
  MY_NICKNAME = input.length > 0 ? input.slice(0,16) : 'Player' + Math.floor(Math.random()*9999);
  document.getElementById('nickname-overlay').style.display='none';

  init();
  initPhysics();
  createGround();
  createPlayer();
  await initBlocks();
  setupControls();
  await startMultiplayer();

  gameStarted = true;
  animate();

  document.getElementById('hint').style.display='block';
  setTimeout(()=>{ document.getElementById('hint').style.display='none'; },4000);
}
</script>
