<!DOCTYPE html>
<html lang="ru">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#272727;--border-hover:#383838;--accent:#ffffff;--accent-dim:rgba(255,255,255,0.08);--text:#ececec;--text2:#888;--text3:#444;--green:#4ade80;--red:#f87171;--orange:#fb923c;--radius:14px;--radius-sm:9px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:36px 20px 80px}
.app-header{width:100%;max-width:580px;display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
h1{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
h1 span{color:var(--text3)}
.nav{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px}
.nav button{background:none;border:none;color:var(--text2);padding:6px 16px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;border-radius:8px;cursor:pointer;transition:all 0.15s}
.nav button:hover{color:var(--text);background:var(--surface2)}
.nav button.active{background:#fff;color:#000}
.page{display:none;width:100%;max-width:580px}
.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:12px}
#drop{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:52px 24px;text-align:center;cursor:pointer;transition:all 0.15s;user-select:none;background:var(--surface2)}
#drop:hover,#drop.over{border-color:#555;background:#1f1f1f}
.drop-icon{font-size:36px;margin-bottom:12px;display:block}
.drop-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px}
.drop-sub{font-size:12px;color:var(--text3)}
#file{display:none}
.ttl-block{margin-top:20px}
.ttl-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ttl-label span:first-child{font-size:13px;color:var(--text2);font-weight:500}
.ttl-value{font-size:12px;font-weight:600;color:#fff;background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
input[type=range]{width:100%;accent-color:#fff;cursor:pointer;height:4px}
.ttl-hints{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:6px}
#bar-wrap{height:2px;background:var(--surface2);border-radius:2px;margin-top:18px;overflow:hidden;opacity:0;transition:opacity 0.2s}
#bar-wrap.visible{opacity:1}
#bar{height:100%;width:0%;background:#fff;border-radius:2px;transition:width 0.25s ease}
#status{font-size:12px;color:var(--text3);margin-top:8px;min-height:18px}
#status.err{color:var(--red)}
#status.warn{color:var(--orange)}
#result{display:none}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.result-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.file-badge{font-size:10px;font-weight:700;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 7px;letter-spacing:1px}
.link-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:center;gap:10px}
.link-box a{color:var(--text2);font-size:12px;text-decoration:none;word-break:break-all;flex:1;line-height:1.5;transition:color 0.15s}
.link-box a:hover{color:var(--text)}
#via{font-size:11px;color:var(--text3);margin-top:5px}
.divider{height:1px;background:var(--border);margin:16px 0}
.meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.meta-stats{display:flex;gap:20px}
.meta-stat{display:flex;flex-direction:column;gap:3px}
.meta-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.meta-stat-val{font-size:15px;font-weight:600;color:var(--text)}
.meta-stat-val.warn{color:var(--orange);font-size:13px}
.meta-actions{display:flex;gap:6px}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
.btn:hover{border-color:var(--border-hover);color:var(--text)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn-primary{background:#fff;border:none;color:#000;padding:7px 16px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;transition:opacity 0.15s;white-space:nowrap;flex-shrink:0}
.btn-primary:hover{opacity:0.85}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn.ok{border-color:var(--green);color:var(--green)}
.btn.danger{color:var(--red)}
.btn.danger:hover{border-color:var(--red);background:rgba(248,113,113,0.06)}
#qr-wrap{display:none;margin-top:14px;justify-content:center}
#qr-wrap.open{display:flex}
#qr-canvas{background:#fff;padding:10px;border-radius:10px}
.pw-section{display:none;flex-direction:column;gap:8px}
.pw-section.visible{display:flex}
.pw-label{font-size:12px;color:var(--text2);font-weight:500}
.pw-row{display:flex;align-items:center;gap:8px}
.pw-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color 0.15s}
.pw-row input:focus{border-color:#555}
.pw-row input::placeholder{color:var(--text3)}
.pw-status{font-size:12px;color:var(--green);min-height:16px}
.profile-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:16px}
.profile-tab{flex:1;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:7px;border-radius:8px;border:none;background:none;color:var(--text2);cursor:pointer;transition:all 0.15s}
.profile-tab:hover{color:var(--text);background:var(--surface2)}
.profile-tab.active{background:#fff;color:#000}
.file-list{display:flex;flex-direction:column;gap:8px}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;display:flex;align-items:center;gap:13px;transition:border-color 0.15s}
.file-item:hover{border-color:var(--border-hover)}
.file-item.expired{opacity:0.4}
.file-item.deleted{opacity:0.3}
.file-thumb{width:48px;height:48px;border-radius:7px;object-fit:cover;background:var(--surface2);flex-shrink:0;border:1px solid var(--border)}
.file-thumb-video{width:48px;height:48px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;border:1px solid var(--border)}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.file-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.file-meta-chip{background:var(--surface2);border-radius:5px;padding:2px 6px}
.chip-warn{color:var(--orange)}
.chip-red{color:var(--red);font-weight:600}
.chip-lock{color:var(--text2)}
.file-actions{display:flex;gap:5px;flex-shrink:0}
.file-actions .btn{padding:5px 11px;font-size:12px}
.empty-state{text-align:center;color:var(--text3);font-size:14px;padding:60px 0;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:36px}
.profile-loading{text-align:center;color:var(--text3);font-size:13px;padding:40px 0}
#view-page{display:none;position:fixed;inset:0;background:#000;z-index:100;flex-direction:column;align-items:center;justify-content:center}
#view-media-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden}
.view-media{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:6px;filter:blur(28px) brightness(0.2);transform:scale(1.06);transition:filter 0.5s ease,transform 0.5s ease;user-select:none;-webkit-user-drag:none;pointer-events:none;-webkit-touch-callout:none;display:none}
.view-media.active{display:block}
.view-media.unlocked{filter:none;transform:scale(1);pointer-events:auto}
#view-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;transition:opacity 0.35s ease;backdrop-filter:blur(3px)}
#view-form{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 28px;background:#111;border:1px solid #2a2a2a;border-radius:16px;min-width:290px;box-shadow:0 32px 80px rgba(0,0,0,0.8)}
.view-logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.view-logo span{color:#444}
.view-sub{font-size:12px;color:#555;letter-spacing:0.3px}
.view-lock-icon{font-size:28px}
.view-attempts{font-size:11px;color:#555}
.view-attempts.warn{color:var(--orange);font-weight:600}
#pw-view-input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:9px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;padding:10px 16px;outline:none;width:230px;text-align:center;transition:border-color 0.15s}
#pw-view-input:focus{border-color:#444}
#pw-view-input.wrong{border-color:var(--red);background:rgba(248,113,113,0.04)}
#view-open-btn{background:#fff;border:none;color:#000;padding:10px 36px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border-radius:9px;cursor:pointer;transition:opacity 0.15s;width:100%}
#view-open-btn:hover{opacity:0.85}
#view-open-btn:disabled{opacity:0.3;cursor:not-allowed}
#pw-err{font-size:12px;color:var(--red);min-height:16px;text-align:center}
#view-loading{position:absolute;font-size:13px;color:#444}
#error-page{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center}
#error-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:44px 32px;background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:360px;width:90%;text-align:center}
#error-icon{font-size:48px;line-height:1}
#error-title{font-size:17px;font-weight:700;color:var(--text)}
#error-sub{font-size:13px;color:var(--text2);line-height:1.7}
#error-back{margin-top:6px;font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;background:var(--surface2);border:1px solid var(--border);padding:8px 22px;border-radius:9px;transition:all 0.15s;font-family:'Inter',sans-serif}
#error-back:hover{color:var(--text);border-color:var(--border-hover)}
@media(max-width:480px){body{padding:20px 14px 50px}.app-header{margin-bottom:22px}#drop{padding:38px 16px}#view-form{min-width:270px;padding:26px 18px}#pw-view-input{width:200px}}
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">
    <div class="logo-icon">📤</div>
    <h1>img<span>up</span></h1>
  </div>
  <div class="nav">
    <button class="active" onclick="showPage('upload')">загрузить</button>
    <button onclick="showPage('profile')">профиль</button>
  </div>
</div>

<div class="page active" id="page-upload">
  <div class="card">
    <div id="drop">
      <span class="drop-icon">🖼️</span>
      <div class="drop-title">Перетащи файл или нажми</div>
      <div class="drop-sub">PNG · JPG · WEBP · GIF · MP4 — до 100MB</div>
    </div>
    <input type="file" id="file" accept="image/*,video/mp4">
    <div class="ttl-block">
      <div class="ttl-label">
        <span>Время жизни ссылки</span>
        <span class="ttl-value" id="ttl-display">24 часа</span>
      </div>
      <input type="range" id="ttl-range" min="1" max="96" value="96" step="1">
      <div class="ttl-hints">
        <span>1 мин</span><span>1 час</span><span>6 часов</span><span>24 часа</span>
      </div>
    </div>
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="status"></div>
  </div>
  <div class="card" id="result">
    <div class="result-header">
      <span class="result-label">Ссылка</span>
      <span class="file-badge" id="file-badge"></span>
    </div>
    <div class="link-box">
      <a id="link" href="#" target="_blank"></a>
      <button class="btn-primary" id="copy-btn" onclick="copyLink()">Копировать</button>
    </div>
    <div id="via"></div>
    <div class="divider"></div>
    <div class="meta-row">
      <div class="meta-stats">
        <div class="meta-stat">
          <span class="meta-stat-label">Просмотры</span>
          <span class="meta-stat-val" id="views-val">0</span>
        </div>
        <div class="meta-stat">
          <span class="meta-stat-label">Истекает</span>
          <span class="meta-stat-val warn" id="ttl-val">—</span>
        </div>
      </div>
      <div class="meta-actions">
        <button class="btn" id="qr-btn" onclick="toggleQR()">QR</button>
      </div>
    </div>
    <div id="qr-wrap"><div id="qr-canvas"></div></div>
    <div class="divider"></div>
    <div class="pw-section" id="pw-section">
      <div class="pw-label">🔒 Пароль на файл</div>
      <div class="pw-row">
        <input type="password" id="pw" placeholder="введи пароль или оставь пустым чтобы снять" autocomplete="new-password">
        <button class="btn" onclick="applyPassword()">применить</button>
      </div>
      <div class="pw-status" id="pw-apply-status"></div>
    </div>
  </div>
</div>

<div class="page" id="page-profile">
  <div class="profile-tabs">
    <button class="profile-tab active" onclick="switchTab('active')">Активные</button>
    <button class="profile-tab" onclick="switchTab('expired')">Истёкшие</button>
    <button class="profile-tab" onclick="switchTab('deleted')">Удалённые</button>
  </div>
  <div id="file-list-wrap">
    <div class="profile-loading">загружаю...</div>
  </div>
</div>

<div id="view-page">
  <div id="view-media-wrap">
    <img id="view-img" class="view-media" src="" alt="" draggable="false" oncontextmenu="return false" ondragstart="return false">
    <video id="view-video" class="view-media" playsinline oncontextmenu="return false" ondragstart="return false" controlslist="nodownload nofullscreen noremoteplayback" disablePictureInPicture></video>
    <div id="view-overlay" style="display:none">
      <div id="view-form">
        <div class="view-lock-icon">🔐</div>
        <div class="view-logo">img<span>up</span></div>
        <div class="view-sub">Файл защищён паролем</div>
        <input id="pw-view-input" type="password" placeholder="Введи пароль" autocomplete="off" spellcheck="false">
        <div class="view-attempts" id="view-attempts">осталось попыток: 3</div>
        <button id="view-open-btn" onclick="checkViewPassword()">Открыть</button>
        <div id="pw-err"></div>
      </div>
    </div>
    <div id="view-loading">загружаю...</div>
  </div>
</div>

<div id="error-page" style="display:none">
  <div id="error-box">
    <div id="error-icon"></div>
    <div id="error-title"></div>
    <div id="error-sub"></div>
    <a href="/" id="error-back">← на главную</a>
  </div>
</div>

<script>
(function() {

  if (typeof location !== 'undefined' && location.href.toLowerCase().indexOf('view-source:') === 0) {
    location.replace('about:blank');
    return;
  }

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U')) { e.preventDefault(); return false; }
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','I','j','J','c','C','k','K'].indexOf(e.key) > -1) { e.preventDefault(); return false; }
    if (e.key === 'F12') { e.preventDefault(); return false; }
  });

  var _s1 = 'https://yktcwkjw'; var _s2 = 'vsqxjhu'; var _s3 = 'gcank.supabase.co';
  var SURL = _s1 + _s2 + _s3;
  var _k1 = 'sb_publi'; var _k2 = 'shable_1vsWjer'; var _k3 = 'wZq95L0n9czgXsA_4BEuxYmB';
  var SKEY = _k1 + _k2 + _k3;
  var BUCKET = ['ima','ges'].join('');
  var IMGBB_KEY = ['a8a01cd8','c5e7ea81','f94ea85d','a3c7e494'].join('');

  var HDRS = { 'apikey': SKEY };

  var CORS_PROXIES = [
    function(u) { return 'https://corsproxy.io/?' + encodeURIComponent(u); },
    function(u) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
    function(u) { return 'https://proxy.cors.sh/' + u; },
    function(u) { return 'https://cors-anywhere.herokuapp.com/' + u; }
  ];

  var MIME_MAP = {
    jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png',
    gif:'image/gif', webp:'image/webp', svg:'image/svg+xml',
    bmp:'image/bmp', tiff:'image/tiff', mp4:'video/mp4'
  };

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function getUserId() {
    var id = localStorage.getItem('imgup_uid');
    if (!id) {
      id = 'u_' + Array.from(crypto.getRandomValues(new Uint8Array(12)), function(b) {
        return b.toString(16).padStart(2,'0');
      }).join('');
      localStorage.setItem('imgup_uid', id);
    }
    return id;
  }

  var USER_ID = getUserId();
  var drop = document.getElementById('drop');
  var fileInput = document.getElementById('file');
  var barWrap = document.getElementById('bar-wrap');
  var bar = document.getElementById('bar');
  var status = document.getElementById('status');
  var result = document.getElementById('result');
  var link = document.getElementById('link');
  var via = document.getElementById('via');
  var ttlRange = document.getElementById('ttl-range');
  var ttlDisplay = document.getElementById('ttl-display');

  var qrGenerated = false;
  var currentImageId = null;
  var currentImageUrl = null;
  var currentIsVideo = false;
  var ttlInterval = null;
  var currentTab = 'active';
  var imgCache = new Map();
  var deletedIds = JSON.parse(localStorage.getItem('imgup_deleted') || '[]');
  var _profileRows = null;

  function saveDeleted() { localStorage.setItem('imgup_deleted', JSON.stringify(deletedIds)); }

  function ttlLabel(v) {
    if (v < 2) return '1 минута';
    if (v < 12) return Math.round(v / 2) + ' мин';
    if (v < 24) return (v / 12).toFixed(1).replace('.0','') + ' ч';
    if (v < 96) return Math.round(v / 12) + ' ч';
    return '24 часа';
  }

  function ttlMs(v) {
    if (v < 2) return 60 * 1000;
    if (v < 12) return Math.round(v / 2) * 60 * 1000;
    if (v < 96) return (v / 12) * 3600 * 1000;
    return 24 * 3600 * 1000;
  }

  ttlRange.addEventListener('input', function() { ttlDisplay.textContent = ttlLabel(+ttlRange.value); });

  window.showPage = function(name) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-' + name).classList.add('active');
    document.querySelectorAll('.nav button').forEach(function(b, i) {
      b.classList.toggle('active', (i === 0 && name === 'upload') || (i === 1 && name === 'profile'));
    });
    if (name === 'profile') { _profileRows = null; loadProfile(); }
  };

  drop.addEventListener('click', function() { fileInput.click(); });
  drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', function(e) { if (!drop.contains(e.relatedTarget)) drop.classList.remove('over'); });
  drop.addEventListener('drop', function(e) {
    e.preventDefault(); drop.classList.remove('over');
    var f = e.dataTransfer.files[0]; if (f) upload(f);
  });
  fileInput.addEventListener('change', function() { if (fileInput.files[0]) upload(fileInput.files[0]); fileInput.value = ''; });

  function slug() {
    return Array.from(crypto.getRandomValues(new Uint8Array(6)), function(b) {
      return b.toString(36).padStart(2,'0');
    }).join('').slice(0,8);
  }

  function extFromFile(f) { return (f.name.includes('.') ? f.name.split('.').pop().toLowerCase() : '') || 'jpg'; }
  function mimeFromFile(f) {
    if (f.type && (f.type.startsWith('image/') || f.type.startsWith('video/'))) return f.type;
    return MIME_MAP[extFromFile(f)] || 'application/octet-stream';
  }
  function isVideoFile(f) { return mimeFromFile(f).startsWith('video/') || extFromFile(f) === 'mp4'; }
  function formatSize(b) {
    if (!b) return '';
    if (b > 1048576) return (b/1048576).toFixed(1)+' MB';
    return (b/1024).toFixed(0)+' KB';
  }
  function formatTTL(expiresAt) {
    var diff = new Date(expiresAt) - Date.now();
    if (diff <= 0) return null;
    var h = Math.floor(diff/3600000);
    var m = Math.floor((diff%3600000)/60000);
    var s = Math.floor((diff%60000)/1000);
    if (h > 0) return h+'ч '+m+'м';
    if (m > 0) return m+'м '+s+'с';
    return s+'с';
  }

  function setBar(pct) { bar.style.width = pct + '%'; }
  function setStatus(msg, cls) { status.textContent = msg; status.className = cls || ''; }

  function toBase64(file) {
    return new Promise(function(res, rej) {
      var r = new FileReader();
      r.onload = function() { res(r.result.split(',')[1]); };
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

  async function tryFetch(url, opts, ms) {
    ms = ms || 8000;
    var ctrl = new AbortController();
    var timer = setTimeout(function() { ctrl.abort(); }, ms);
    try {
      var r = await fetch(url, Object.assign({}, opts, { signal: ctrl.signal }));
      clearTimeout(timer);
      return r;
    } catch(e) { clearTimeout(timer); throw e; }
  }

  function makeHeaders(extra) {
    return Object.assign({}, HDRS, extra || {});
  }

  async function uploadToSupabase(file) {
    var ext = extFromFile(file);
    var mime = mimeFromFile(file);
    var name = slug() + '.' + ext;
    var endpoint = SURL + '/storage/v1/object/' + BUCKET + '/' + name;
    var publicUrl = SURL + '/storage/v1/object/public/' + BUCKET + '/' + name;
    var r = await tryFetch(endpoint, {
      method: 'POST',
      headers: makeHeaders({ 'Content-Type': mime, 'x-upsert': 'true' }),
      body: file, mode: 'cors', credentials: 'omit'
    }, 30000);
    if (!r.ok) throw new Error('supabase ' + r.status);
    return { url: publicUrl, via: 'supabase', name: name };
  }

  async function uploadViaProxy(file, proxyFn) {
    var ext = extFromFile(file);
    var mime = mimeFromFile(file);
    var name = slug() + '.' + ext;
    var publicUrl = SURL + '/storage/v1/object/public/' + BUCKET + '/' + name;
    var r = await tryFetch(proxyFn(SURL + '/storage/v1/object/' + BUCKET + '/' + name), {
      method: 'POST',
      headers: makeHeaders({ 'Content-Type': mime, 'x-upsert': 'true', 'x-requested-with': 'XMLHttpRequest' }),
      body: file, mode: 'cors', credentials: 'omit'
    }, 30000);
    if (!r.ok) throw new Error('proxy ' + r.status);
    return { url: publicUrl, via: 'proxy', name: name };
  }

  async function uploadViaXHR(file) {
    var ext = extFromFile(file);
    var mime = mimeFromFile(file);
    var name = slug() + '.' + ext;
    var endpoint = SURL + '/storage/v1/object/' + BUCKET + '/' + name;
    var publicUrl = SURL + '/storage/v1/object/public/' + BUCKET + '/' + name;
    return new Promise(function(resolve, reject) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', endpoint);
      xhr.setRequestHeader('apikey', SKEY);
      xhr.setRequestHeader('Content-Type', mime);
      xhr.setRequestHeader('x-upsert', 'true');
      xhr.timeout = 30000;
      xhr.upload.onprogress = function(e) { if (e.lengthComputable) setBar(10 + (e.loaded/e.total)*70); };
      xhr.onload = function() { xhr.status >= 200 && xhr.status < 300 ? resolve({ url: publicUrl, via: 'supabase-xhr', name: name }) : reject(new Error('xhr ' + xhr.status)); };
      xhr.onerror = function() { reject(new Error('xhr network error')); };
      xhr.ontimeout = function() { reject(new Error('xhr timeout')); };
      xhr.send(file);
    });
  }

  async function uploadToImgBB(file) {
    if (isVideoFile(file)) throw new Error('imgbb: видео не поддерживается');
    var b64 = await toBase64(file);
    var fd = new FormData();
    fd.append('key', IMGBB_KEY);
    fd.append('image', b64);
    fd.append('name', slug());
    var r = await tryFetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd, mode: 'cors', credentials: 'omit' }, 20000);
    if (!r.ok) throw new Error('imgbb ' + r.status);
    var json = await r.json();
    if (!json.success) throw new Error('imgbb failed');
    return { url: json.data.url, via: 'imgbb', name: json.data.image.filename };
  }

  async function saveImageMeta(imageUrl, fileName, file, videoFlag) {
    var ms = ttlMs(+ttlRange.value);
    var expiresAt = new Date(Date.now() + ms).toISOString();
    var r = await tryFetch(SURL + '/rest/v1/images', {
      method: 'POST',
      headers: makeHeaders({ 'Content-Type': 'application/json', 'Prefer': 'return=representation' }),
      body: JSON.stringify({
        filename: fileName, original_name: file.name, url: imageUrl,
        size: file.size, mime_type: mimeFromFile(file),
        views: 0, expires_at: expiresAt, is_video: videoFlag,
        user_id: USER_ID
      }),
      mode: 'cors', credentials: 'omit'
    }, 10000).catch(function() { return null; });

    if (r && r.ok) {
      var rows = await r.json().catch(function() { return []; });
      var row = rows[0];
      if (row && row.expires_at) startTTLTimer(new Date(row.expires_at));
      return row ? row.id : null;
    }
    return null;
  }

  function startTTLTimer(expiresAt) {
    if (ttlInterval) clearInterval(ttlInterval);
    var el = document.getElementById('ttl-val');
    var tick = function() {
      var t = formatTTL(expiresAt);
      if (!t) { el.textContent = 'истекло'; clearInterval(ttlInterval); return; }
      el.textContent = t;
    };
    tick();
    ttlInterval = setInterval(tick, 1000);
  }

  async function fetchImageRow(viewId) {
    var endpoint = SURL + '/rest/v1/images?id=eq.' + encodeURIComponent(viewId) + '&select=url,password,views,expires_at,is_video,mime_type';
    var attempts = [
      function() { return tryFetch(endpoint, { headers: HDRS, mode: 'cors', credentials: 'omit' }, 8000); },
      function() { return tryFetch('https://corsproxy.io/?' + encodeURIComponent(endpoint), { headers: HDRS, mode: 'cors', credentials: 'omit' }, 8000); },
      function() { return tryFetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(endpoint), { headers: HDRS, mode: 'cors', credentials: 'omit' }, 8000); }
    ];
    for (var i = 0; i < attempts.length; i++) {
      try {
        var r = await attempts[i]();
        if (!r || !r.ok) continue;
        var rows = await r.json().catch(function() { return []; });
        if (rows.length) return rows[0];
      } catch(e) {}
    }
    return null;
  }

  function preloadImage(url) {
    if (imgCache.has(url)) return imgCache.get(url);
    var p = new Promise(function(resolve) {
      var img = new Image(); img.onload = img.onerror = function() { resolve(url); }; img.src = url;
    });
    imgCache.set(url, p);
    return p;
  }

  async function upload(file) {
    var videoFlag = isVideoFile(file);
    if (file.size > 100 * 1024 * 1024) { setStatus('файл слишком большой — максимум 100MB', 'err'); return; }

    result.style.display = 'none';
    qrGenerated = false;
    currentImageId = null;
    currentImageUrl = null;
    currentIsVideo = videoFlag;
    document.getElementById('qr-canvas').innerHTML = '';
    document.getElementById('qr-wrap').classList.remove('open');
    document.getElementById('qr-btn').textContent = 'QR';
    document.getElementById('pw').value = '';
    document.getElementById('pw-apply-status').textContent = '';
    document.getElementById('pw-section').classList.remove('visible');
    via.textContent = '';
    barWrap.classList.add('visible');
    setBar(5);
    setStatus('загружаю...');

    var strategies = [
      { name: 'подключение...', fn: function() { return uploadToSupabase(file); } },
      { name: 'XHR...', fn: function() { return uploadViaXHR(file); } },
      { name: 'прокси 1...', fn: function() { return uploadViaProxy(file, CORS_PROXIES[0]); } },
      { name: 'прокси 2...', fn: function() { return uploadViaProxy(file, CORS_PROXIES[1]); } },
      { name: 'прокси 3...', fn: function() { return uploadViaProxy(file, CORS_PROXIES[2]); } },
      { name: 'прокси 4...', fn: function() { return uploadViaProxy(file, CORS_PROXIES[3]); } }
    ];
    if (!videoFlag) strategies.push({ name: 'imgbb...', fn: function() { return uploadToImgBB(file); } });

    var lastErr = '';
    for (var i = 0; i < strategies.length; i++) {
      var s = strategies[i];
      setStatus(s.name);
      setBar(5 + (i / strategies.length) * 60);
      try {
        var res = await s.fn();
        setBar(80);
        setStatus('сохраняю...');
        var results2 = await Promise.all([
          saveImageMeta(res.url, res.name, file, videoFlag),
          videoFlag ? Promise.resolve() : preloadImage(res.url)
        ]);
        var id = results2[0];
        currentImageId = id;
        currentImageUrl = res.url;
        setBar(100);
        setStatus(i > 0 ? ('загружено: ' + s.name.replace('...','')) : '', i > 0 ? 'warn' : '');
        document.getElementById('file-badge').textContent = videoFlag ? 'MP4' : 'IMG';
        link.href = res.url;
        link.textContent = res.url;
        via.textContent = res.via !== 'supabase' ? 'via ' + res.via : '';
        document.getElementById('views-val').textContent = '0';
        result.style.display = 'block';
        if (id) document.getElementById('pw-section').classList.add('visible');
        setTimeout(function() { barWrap.classList.remove('visible'); setBar(0); }, 400);
        return;
      } catch(e) { lastErr = e.message; }
    }
    barWrap.classList.remove('visible');
    setBar(0);
    setStatus('ошибка: ' + lastErr, 'err');
  }

  function renderTab(rows) {
    var wrap = document.getElementById('file-list-wrap');
    var now = new Date();
    var active = rows.filter(function(r) { return !deletedIds.includes(r.id) && new Date(r.expires_at) > now; });
    var expired = rows.filter(function(r) { return !deletedIds.includes(r.id) && new Date(r.expires_at) <= now; });
    var deleted = rows.filter(function(r) { return deletedIds.includes(r.id); });
    var list = currentTab === 'active' ? active : currentTab === 'expired' ? expired : deleted;

    if (!list.length) {
      var icons = { active: '📂', expired: '⏳', deleted: '🗑️' };
      var texts = { active: 'Нет активных файлов', expired: 'Нет истёкших файлов', deleted: 'Нет удалённых файлов' };
      wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">' + icons[currentTab] + '</div><span>' + texts[currentTab] + '</span></div>';
      return;
    }

    var base = location.origin + location.pathname.replace(/\/+$/,'');
    var items = list.map(function(row) {
      var isVid = row.is_video || (row.mime_type && row.mime_type.startsWith('video/'));
      var isExpired = new Date(row.expires_at) <= now;
      var isDel = deletedIds.includes(row.id);
      var ttlLeft = isExpired ? null : formatTTL(row.expires_at);
      var name = esc(row.original_name || row.filename);
      var size = formatSize(row.size);
      var viewUrl = row.password ? base + '?view=' + esc(row.id) : esc(row.url);
      var thumb = isVid ? '<div class="file-thumb-video">🎬</div>' : '<img class="file-thumb" src="' + esc(row.url) + '" loading="lazy" onerror="this.style.background=\'#1c1c1c\'">';
      var chips = [];
      if (size) chips.push('<span class="file-meta-chip">' + size + '</span>');
      chips.push('<span class="file-meta-chip">👁 ' + (row.views || 0) + '</span>');
      if (isDel) chips.push('<span class="file-meta-chip chip-red">удалено</span>');
      else if (isExpired) chips.push('<span class="file-meta-chip chip-red">истекло</span>');
      else if (ttlLeft) chips.push('<span class="file-meta-chip chip-warn">⏱ ' + ttlLeft + '</span>');
      if (row.password) chips.push('<span class="file-meta-chip chip-lock">🔒</span>');
      var actions = (isDel || isExpired) ? '' :
        '<div class="file-actions">' +
        '<button class="btn" onclick="copyUrl(\'' + viewUrl + '\', this)">копировать</button>' +
        '<button class="btn danger" onclick="deleteFile(\'' + esc(row.id) + '\',\'' + esc(row.filename) + '\', this)">удалить</button>' +
        '</div>';
      return '<div class="file-item' + (isExpired ? ' expired' : '') + (isDel ? ' deleted' : '') + '" id="fitem-' + esc(row.id) + '">' +
        thumb +
        '<div class="file-info"><div class="file-name" title="' + name + '">' + name + '</div>' +
        '<div class="file-meta">' + chips.join('') + '</div></div>' +
        actions + '</div>';
    }).join('');
    wrap.innerHTML = '<div class="file-list">' + items + '</div>';
  }

  })();

  window.checkViewPassword = async function() {
    var input = document.getElementById('pw-view-input');
    var err = document.getElementById('pw-err');
    var btn = document.getElementById('view-open-btn');
    var attemptsEl = document.getElementById('view-attempts');
    var val = input.value.trim();
    if (!val || btn.disabled || window._vl) return;

    btn.disabled = true; btn.textContent = '...';
    var hash = await sha256(val);
    btn.disabled = false; btn.textContent = 'Открыть';

    if (hash === window._vh) {
      var overlay = document.getElementById('view-overlay');
      var viewImg = document.getElementById('view-img');
      var viewVideo = document.getElementById('view-video');
      overlay.style.opacity = '0';
      setTimeout(function() { overlay.style.display = 'none'; }, 380);
      if (window._vv) { viewVideo.classList.add('unlocked'); viewVideo.controls = true; viewVideo.play().catch(function() {}); }
      else { viewImg.classList.add('unlocked'); }
      return;
    }

    window._va--;
    input.value = '';
    input.classList.remove('wrong');
    void input.offsetWidth;
    input.classList.add('wrong');
    setTimeout(function() { input.classList.remove('wrong'); }, 1200);

    if (window._va <= 0) {
      window._vl = true;
      btn.disabled = true; input.disabled = true; err.textContent = '';
      var sec = 30;
      attemptsEl.className = 'view-attempts warn';
      attemptsEl.textContent = 'заблокировано на ' + sec + ' сек';
      var t = setInterval(function() {
        sec--;
        attemptsEl.textContent = 'заблокировано на ' + sec + ' сек';
        if (sec <= 0) {
          clearInterval(t);
          window._va = 3; window._vl = false;
          btn.disabled = false; input.disabled = false; input.focus();
          err.textContent = '';
          attemptsEl.className = 'view-attempts';
          attemptsEl.textContent = 'осталось попыток: 3';
        }
      }, 1000);
      return;
    }

    err.textContent = 'неверный пароль';
    attemptsEl.className = window._va === 1 ? 'view-attempts warn' : 'view-attempts';
    attemptsEl.textContent = 'осталось попыток: ' + window._va;
    setTimeout(function() { err.textContent = ''; }, 1800);
  };

  document.getElementById('pw-view-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') window.checkViewPassword();
  });

})();
</script>
</body>
</html>
